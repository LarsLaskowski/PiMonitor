version: 2

project_name: pimonitor

builds:
  - id: pimonitor
    main: ./cmd/pimonitor
    binary: pimonitor
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - arm
      - arm64
    goarm:
      - "6"
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: pimonitor
    formats: [tar.gz]
    # Wrap everything in a single top-level directory named after the archive
    # (e.g. pimonitor_1.2.3_linux_arm64/) so extracting doesn't litter the
    # current directory. install.sh and the binary end up side by side inside
    # it, so installing is just: cd <dir> && sudo ./install.sh
    wrap_in_directory: true
    files:
      # Flatten the packaging/ files to the archive (wrap-dir) root so they sit
      # next to the binary that GoReleaser always places there.
      - src: packaging/*
        strip_parent: true
      - README.md
      - LICENSE.md

checksum:
  name_template: checksums.txt

changelog:
  disable: false

release:
  github:
    owner: larslaskowski
    name: pimonitor
