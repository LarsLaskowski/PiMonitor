# Example PiMonitor configuration. Copy to /etc/pimonitor/config.yaml and
# adjust as needed. Any key you omit falls back to its built-in default -
# see internal/config/config.go for the full list of defaults.

# Address the web dashboard and REST API listen on.
listen_addr: ":8080"

# debug, info, warn, or error.
log_level: "info"

# How often live metrics (CPU, load average, temperature, memory/swap,
# disk, network) are sampled.
poll_interval_seconds: 5

# How often available apt updates are checked. This only reads the
# existing apt cache (`apt list --upgradable`) - it never refreshes it.
# The cache itself is refreshed by the separate pimonitor-apt-update.timer
# systemd unit, which runs with root privileges.
updates_check_minutes: 15

# How old the apt cache may be (in minutes) before the dashboard flags the
# update count as possibly stale. Should be a small multiple of the
# apt-update timer's interval (default: every 6 hours).
updates_stale_threshold_minutes: 720

# How much history to retain for sparklines, in minutes.
history_window_minutes: 60

# Whether to periodically snapshot metric history to disk so sparklines
# survive service restarts and reboots. History is flushed on the update
# check interval and on clean shutdown; on startup, points older than
# history_window_minutes are discarded.
history_persist_enabled: true

# Directory the history snapshot (history.bin) is written to. Must be
# writable by the service user; the systemd unit creates and allows
# /var/lib/pimonitor via StateDirectory=/ReadWritePaths=, so change both
# if you change this.
data_dir: "/var/lib/pimonitor"

# Whether to collect and display network interface throughput.
network_enabled: true

# Whether to show the OS distribution / Raspberry Pi model in the
# dashboard.
distro_info_enabled: true
pi_model_enabled: true

# If set, all /api/v1/... requests must include this value as either
# "Authorization: Bearer <api_key>" or "X-Api-Key: <api_key>". Leave empty
# (the default) to allow unauthenticated access on a trusted LAN. Set this
# before exposing the API to other systems (e.g. openHAB). The bundled web
# dashboard will prompt for this key once per browser and remember it in
# localStorage.
# Because this is a secret, install.sh keeps /etc/pimonitor/config.yaml
# readable only by root and the 'pimonitor' group (mode 640). If you copy
# the config manually, apply the same permissions:
#   sudo chown root:pimonitor /etc/pimonitor/config.yaml
#   sudo chmod 640 /etc/pimonitor/config.yaml
api_key: ""

# Color-coding thresholds for the dashboard (and the load-average gauge
# scale, which uses the CPU thresholds relative to core count).
thresholds:
  temperature_warn_c: 60
  temperature_crit_c: 75
  cpu_warn_percent: 80
  cpu_crit_percent: 95
  disk_warn_percent: 80
  disk_crit_percent: 95
  swap_warn_percent: 50
  swap_crit_percent: 90
  memory_warn_percent: 80
  memory_crit_percent: 95

# Server-side threshold alert engine. On each poll it maps the current
# metrics against the thresholds above into per-metric alert states
# (ok/warn/crit) and a rolling list of fired/cleared transition events,
# exposed via GET /api/v1/alerts for third-party integrations.
alerts:
  # Whether the alert engine runs. When false, GET /api/v1/alerts reports
  # enabled=false with no states or events.
  enabled: true
  # Debounce window: a threshold crossing must persist for at least this
  # many seconds before it is reported as an alert, so short-lived spikes
  # (and momentary dips back to ok) don't flap. Set to 0 to fire on the
  # first crossing.
  for_seconds: 30

  # Optional HTTP webhooks. On every fired/cleared transition, PiMonitor
  # POSTs a JSON body to each webhook whose min_level the event reaches.
  # Delivery happens off the collection path, so a slow or failing webhook
  # never blocks metric collection. A single generic webhook covers Slack,
  # Discord, Home Assistant, ntfy, etc. via their incoming-webhook formats.
  # (No webhooks are configured by default.)
  webhooks: []
  #  - url: "https://hooks.example.com/pimonitor"
  #    # Only send events reaching at least this severity: "warn" (default,
  #    # every transition) or "crit".
  #    min_level: "warn"
  #    # Optional Go text/template rendered into the request body. When
  #    # omitted, a default JSON object describing the event is sent. The
  #    # template sees: .Metric, .Resource, .Kind ("fired"/"cleared"),
  #    # .From, .To, .Value, .At, .Message. Example Slack payload:
  #    # template: '{"text": "PiMonitor: {{.Message}}"}'
  #    # Content-Type header (default "application/json"). Override it if a
  #    # custom template renders a non-JSON body, e.g. "text/plain".
  #    content_type: "application/json"
  #    # Per-attempt timeout in seconds (0 uses the built-in 10s default).
  #    timeout_seconds: 10

  # How many times a failed webhook delivery is retried, with exponential
  # backoff, before it is given up on. 0 means a single attempt.
  notify_max_retries: 3
  # Base delay (seconds) before the first retry; it doubles each attempt.
  notify_retry_backoff_seconds: 1
  # Rate limit: coalesce repeated *firing* events for the same metric that
  # arrive within this many seconds of the previous delivery to the same
  # webhook URL, so a flapping metric can't flood a destination. "cleared"
  # (recovery) events are never rate-limited, so a downstream consumer can't
  # get stuck showing an alert that has actually cleared. 0 disables it.
  notify_min_interval_seconds: 5
